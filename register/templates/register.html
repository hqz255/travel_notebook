{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="{% static 'bootstrap/bootstrap.min.css' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 导航栏样式 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .navbar .nav-link {
            color: #fff !important;
            font-size: 15px;
            margin: 0 12px;
            transition: color 0.3s;
        }

        .navbar .nav-link:hover {
            color: #00d4ff !important;
        }

        .navbar .navbar-brand {
            color: #fff !important;
            font-size: 22px;
            font-weight: bold;
        }

        .navbar .navbar-brand:hover {
            color: #00d4ff !important;
        }

        /* 主体区域 - 使用 register_bj.png 作为背景 */
        .main-content {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background: url("{% static 'images/register_bj.png' %}") no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 80px;
        }

        /* 主体内容文字 */
        .hero-text {
            position: absolute;
            left: calc((100% - 80px - 50px - 450px) / 2);
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero-text h1 {
            font-size: 52px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .hero-text p {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 36px;
        }

        /* 注册卡片 - 透明玻璃质感 */
        .register-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            padding: 40px 40px;
            width: 450px;
            max-width: 90vw;
            margin-right: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .register-title {
            color: #fff;
            text-align: center;
            font-size: 27px;
            font-weight: bold;
            margin-bottom: 28px;
        }

        .register-form .form-group {
            margin-bottom: 18px;
        }

        .register-form .form-input {
            width: 100%;
            padding: 13px 18px;
            font-size: 16px;
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 9px;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }

        .register-form .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .register-form .form-input:focus {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-register {
            width: 100%;
            padding: 14px 0;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 9px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 15px;
        }

        .login-link a {
            color: #00d4ff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: #fff;
        }

        .verify-group {
            display: flex;
            gap: 10px;
        }

        .verify-input {
            flex: 1;
        }

        .btn-verify {
            padding: 13px 18px;
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 9px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.3s, border-color 0.3s;
        }

        .btn-verify:hover {
            background: rgba(0, 212, 255, 0.4);
            border-color: #00d4ff;
        }

        /* 底部栏 */
        .footer {
            background: rgba(0, 0, 0, 0.85);
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
        }

        .footer a {
            color: #00d4ff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #fff;
        }

        .footer .footer-links {
            margin-bottom: 8px;
        }

        .footer .footer-links a {
            margin: 0 15px;
        }

        .footer .footer-copy {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }
    </style>
</head>
<body>

    {% include 'includes/navbar.html' %}

    <!-- 主体背景区域 -->
    <div class="main-content">
        <div class="hero-text">

        </div>

        <!-- 注册表单 -->
        <div class="register-card">
            <h3 class="register-title">用户注册</h3>
            <form class="register-form" action="" method="post">
                {% csrf_token %}

                {% if errors %}
                <div class="alert alert-danger" style="padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:14px;">
                    <ul style="margin:0;padding-left:18px;">
                        {% for error in errors %}
                        <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

                {% if success %}
                <div class="alert alert-success" style="padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:14px;text-align:center;">
                    注册成功！<a href="{% url 'index' %}" style="color:#00d4ff;">前往登录</a>
                </div>
                {% endif %}

                <div class="form-group">
                    <input type="text" class="form-input" name="username"
                           placeholder="请输入用户名" value="{{ form_data.username|default:'' }}" required>
                </div>
                <div class="form-group">
                    <input type="email" class="form-input" name="email" id="email"
                           placeholder="请输入邮箱" value="{{ form_data.email|default:'' }}" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" name="password"
                           placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" name="confirm_password"
                           placeholder="请确认密码" required>
                </div>
                <div class="form-group verify-group">
                    <input type="text" class="form-input verify-input" name="verification_code"
                           placeholder="请输入验证码" required>
                    <button type="button" class="btn-verify" id="sendCodeBtn">发送验证码</button>
                </div>
                <button type="submit" class="btn-register">立即注册</button>
                <div class="login-link">
                    已有账号，<a href="{% url 'index' %}">前往首页</a>
                </div>
            </form>
        </div>
    </div>

    {% include 'includes/footer.html' %}

    {% include 'includes/modals.html' %}

    <script src="{% static 'Jquery/jquery.min.js' %}"></script>
    <script src="{% static 'bootstrap/bootstrap.bundle.min.js' %}"></script>
    <script>
        $(function () {
            var $sendBtn = $('#sendCodeBtn');
            var countdown = 0;
            var timer = null;

            $sendBtn.on('click', function () {
                if (countdown > 0) return;

                var email = $('#email').val().trim();
                if (!email) {
                    alert('请先输入邮箱地址');
                    return;
                }

                // 发送前禁用按钮，防止重复点击
                $sendBtn.text('发送中...').prop('disabled', true);

                $.ajax({
                    url: "{% url 'send_code' %}",
                    type: 'POST',
                    data: { email: email },
                    headers: { 'X-CSRFToken': $('input[name="csrfmiddlewaretoken"]').val() },
                    success: function (res) {
                        if (res.success) {
                            alert(res.message || '验证码已发送，请注意查收邮件');
                            // 开始倒计时
                            countdown = 60;
                            $sendBtn.text(countdown + '秒后重发').prop('disabled', true);
                            timer = setInterval(function () {
                                countdown--;
                                if (countdown <= 0) {
                                    clearInterval(timer);
                                    $sendBtn.text('发送验证码').prop('disabled', false);
                                } else {
                                    $sendBtn.text(countdown + '秒后重发');
                                }
                            }, 1000);
                        } else {
                            // 发送失败，恢复按钮
                            alert(res.message || '验证码发送失败，请重试');
                            $sendBtn.text('发送验证码').prop('disabled', false);
                        }
                    },
                    error: function () {
                        alert('验证码发送失败，请检查网络后重试');
                        countdown = 0;
                        clearInterval(timer);
                        $sendBtn.text('发送验证码').prop('disabled', false);
                    }
                });
            });
        });
    </script>
</body>
</html>
